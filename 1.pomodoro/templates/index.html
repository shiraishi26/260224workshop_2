<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゲーミフィケーションポモドーロタイマー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .timer-section {
            text-align: center;
        }

        .timer-display {
            font-size: 5em;
            font-weight: bold;
            color: #667eea;
            margin: 30px 0;
            font-family: 'Courier New', monospace;
        }

        .timer-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .stats-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .level-display {
            text-align: center;
            margin-bottom: 20px;
        }

        .level-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .xp-bar-container {
            background: #e0e0e0;
            border-radius: 10px;
            height: 25px;
            overflow: hidden;
            margin: 10px 0;
        }

        .xp-bar {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            margin: 8px 0;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .stat-label {
            font-weight: 600;
            color: #555;
        }

        .stat-value {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1em;
        }

        .badges-section {
            grid-column: 1 / -1;
        }

        .badges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .badge-card {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .badge-card:hover {
            transform: translateY(-5px);
        }

        .badge-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .badge-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .badge-description {
            font-size: 0.9em;
            color: #666;
        }

        .charts-section {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .chart-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .chart-title {
            color: #667eea;
            font-size: 1.3em;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 200px;
            padding: 20px 0;
            border-bottom: 2px solid #e0e0e0;
        }

        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .bar {
            width: 40px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 5px 5px 0 0;
            transition: height 0.5s ease;
            margin-bottom: 8px;
            position: relative;
        }

        .bar-label {
            font-size: 0.85em;
            color: #666;
            margin-top: 5px;
            font-weight: 600;
        }

        .bar-value {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85em;
            font-weight: bold;
            color: #667eea;
        }

        .monthly-summary {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .summary-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #e0e0e0;
        }

        .summary-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .summary-label {
            color: #666;
            font-size: 0.95em;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1000;
            animation: slideIn 0.3s ease;
            max-width: 400px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification.success {
            border-left: 5px solid #4caf50;
        }

        .notification.level-up {
            border-left: 5px solid #ffd700;
        }

        .notification h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .audio-toggle {
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        @media (max-width: 768px) {
            .main-content, .charts-section {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            .timer-display {
                font-size: 3.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🍅 ゲーミフィケーションポモドーロタイマー</h1>
            <p>集中力を高め、達成感を得よう！</p>
        </header>

        <div class="main-content">
            <!-- タイマーセクション -->
            <div class="card timer-section">
                <h2>タイマー</h2>
                <div class="timer-display" id="timer">25:00</div>
                <div class="timer-controls">
                    <button class="btn-primary" id="startBtn" onclick="startTimer()">スタート</button>
                    <button class="btn-secondary" id="pauseBtn" onclick="pauseTimer()" style="display: none;">一時停止</button>
                    <button class="btn-secondary" onclick="resetTimer()">リセット</button>
                </div>
                <div class="audio-toggle">
                    <label>
                        <input type="checkbox" id="soundToggle" checked> サウンド
                    </label>
                </div>
            </div>

            <!-- 統計セクション -->
            <div class="card stats-section">
                <h2>あなたの進捗</h2>
                <div class="level-display">
                    <div class="level-badge">レベル <span id="level">1</span></div>
                    <div class="xp-bar-container">
                        <div class="xp-bar" id="xpBar" style="width: 0%;">
                            <span id="xpText">0 / 100 XP</span>
                        </div>
                    </div>
                </div>
                <div class="stat-item">
                    <span class="stat-label">🔥 現在のストリーク</span>
                    <span class="stat-value" id="currentStreak">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">⭐ 最大ストリーク</span>
                    <span class="stat-value" id="maxStreak">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">📊 総ポモドーロ数</span>
                    <span class="stat-value" id="totalPomodoros">0</span>
                </div>
            </div>
        </div>

        <!-- バッジセクション -->
        <div class="card badges-section">
            <h2>🏆 獲得バッジ</h2>
            <div class="badges-grid" id="badgesGrid">
                <div style="text-align: center; grid-column: 1 / -1; color: #999; padding: 20px;">
                    まだバッジを獲得していません。ポモドーロを完了してバッジを集めよう！
                </div>
            </div>
        </div>

        <!-- グラフセクション -->
        <div class="charts-section">
            <!-- 週間統計 -->
            <div class="chart-container">
                <div class="chart-title">📅 週間統計</div>
                <div class="bar-chart" id="weeklyChart">
                    <!-- JavaScriptで動的に生成 -->
                </div>
            </div>

            <!-- 月間統計 -->
            <div class="chart-container">
                <div class="chart-title">📆 月間統計</div>
                <div class="monthly-summary" id="monthlySummary">
                    <!-- JavaScriptで動的に生成 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let timeLeft = 25 * 60; // 25分（秒単位）
        let timerInterval = null;
        let isRunning = false;
        let isPaused = false;

        // 初期化時に統計を読み込み
        loadStats();

        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateTimerDisplay() {
            document.getElementById('timer').textContent = formatTime(timeLeft);
        }

        function startTimer() {
            if (!isRunning) {
                isRunning = true;
                isPaused = false;
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('pauseBtn').style.display = 'inline-block';
                
                timerInterval = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateTimerDisplay();
                    } else {
                        completePomodoro();
                    }
                }, 1000);
            }
        }

        function pauseTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                isPaused = true;
                document.getElementById('startBtn').style.display = 'inline-block';
                document.getElementById('startBtn').textContent = '再開';
                document.getElementById('pauseBtn').style.display = 'none';
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            isPaused = false;
            timeLeft = 25 * 60;
            updateTimerDisplay();
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('startBtn').textContent = 'スタート';
            document.getElementById('pauseBtn').style.display = 'none';
        }

        async function completePomodoro() {
            clearInterval(timerInterval);
            isRunning = false;
            
            // サウンド再生
            if (document.getElementById('soundToggle').checked) {
                playCompletionSound();
            }

            try {
                const response = await fetch('/api/complete-pomodoro', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        focus_time: 25
                    })
                });

                const result = await response.json();
                
                // 完了通知
                showNotification('success', 
                    `🎉 ポモドーロ完了！\n+${result.xp_gained} XP 獲得`);

                // レベルアップ通知
                if (result.level_up) {
                    setTimeout(() => {
                        showNotification('level-up', 
                            `🎊 レベルアップ！\nレベル ${result.new_level} に到達しました！`);
                    }, 1500);
                }

                // 新しいバッジ通知
                if (result.new_badges && result.new_badges.length > 0) {
                    result.new_badges.forEach((badge, index) => {
                        setTimeout(() => {
                            showNotification('success', 
                                `🏆 新しいバッジ獲得！\n${badge.name}\n${badge.description}`);
                        }, 3000 + (index * 2000));
                    });
                }

                // 統計を再読み込み
                await loadStats();

            } catch (error) {
                console.error('Error completing pomodoro:', error);
            }

            resetTimer();
        }

        function playCompletionSound() {
            // Web Audio APIで簡単な完了音を生成
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 800;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        function showNotification(type, message) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `<h3>${message.split('\n')[0]}</h3><p>${message.split('\n').slice(1).join('<br>')}</p>`;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();

                // レベルとXP
                document.getElementById('level').textContent = stats.level;
                const xpPercent = (stats.xp_progress / stats.xp_needed) * 100;
                document.getElementById('xpBar').style.width = `${xpPercent}%`;
                document.getElementById('xpText').textContent = `${stats.xp_progress} / ${stats.xp_needed} XP`;

                // ストリークと総数
                document.getElementById('currentStreak').textContent = `${stats.current_streak} 日`;
                document.getElementById('maxStreak').textContent = `${stats.max_streak} 日`;
                document.getElementById('totalPomodoros').textContent = `${stats.total_pomodoros} 回`;

                // バッジ表示
                renderBadges(stats.badges);

                // 週間グラフ
                renderWeeklyChart(stats.weekly_stats);

                // 月間統計
                renderMonthlySummary(stats.monthly_stats);

            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        function renderBadges(badges) {
            const grid = document.getElementById('badgesGrid');
            
            if (badges.length === 0) {
                grid.innerHTML = `<div style="text-align: center; grid-column: 1 / -1; color: #999; padding: 20px;">
                    まだバッジを獲得していません。ポモドーロを完了してバッジを集めよう！
                </div>`;
                return;
            }

            grid.innerHTML = badges.map(badge => `
                <div class="badge-card">
                    <div class="badge-icon">🏆</div>
                    <div class="badge-name">${badge.name}</div>
                    <div class="badge-description">${badge.description}</div>
                </div>
            `).join('');
        }

        function renderWeeklyChart(weeklyStats) {
            const chart = document.getElementById('weeklyChart');
            const maxPomodoros = Math.max(...weeklyStats.map(d => d.pomodoros), 1);

            chart.innerHTML = weeklyStats.map(day => {
                const height = (day.pomodoros / maxPomodoros) * 150;
                return `
                    <div class="bar-item">
                        <div class="bar" style="height: ${height}px;">
                            ${day.pomodoros > 0 ? `<span class="bar-value">${day.pomodoros}</span>` : ''}
                        </div>
                        <div class="bar-label">${day.day_name}</div>
                    </div>
                `;
            }).join('');
        }

        function renderMonthlySummary(monthlyStats) {
            const summary = document.getElementById('monthlySummary');
            summary.innerHTML = `
                <div class="summary-card">
                    <div class="summary-value">${monthlyStats.total_pomodoros}</div>
                    <div class="summary-label">総ポモドーロ数</div>
                </div>
                <div class="summary-card">
                    <div class="summary-value">${monthlyStats.days_active}</div>
                    <div class="summary-label">活動日数</div>
                </div>
                <div class="summary-card">
                    <div class="summary-value">${Math.round(monthlyStats.total_focus_time / 60)}</div>
                    <div class="summary-label">総集中時間（時間）</div>
                </div>
                <div class="summary-card">
                    <div class="summary-value">${Math.round(monthlyStats.completion_rate)}%</div>
                    <div class="summary-label">完了率</div>
                </div>
            `;
        }

        // 30秒ごとに統計を自動更新（サーバー負荷を軽減）
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
