<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer - 視覚的フィードバック強化版</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="particles-container"></div>
    <div id="ripple-container"></div>
    
    <div class="container">
        <h1>🍅 Pomodoro Timer</h1>
        
        <div class="timer-container">
            <svg class="progress-ring" width="300" height="300">
                <circle class="progress-ring-bg" cx="150" cy="150" r="130" />
                <circle class="progress-ring-circle" cx="150" cy="150" r="130" />
            </svg>
            
            <div class="timer-content">
                <div id="timer-display">25:00</div>
                <div id="timer-mode">集中時間</div>
            </div>
        </div>
        
        <div class="controls">
            <button id="start-btn" class="btn btn-primary">開始</button>
            <button id="pause-btn" class="btn btn-secondary" disabled>一時停止</button>
            <button id="reset-btn" class="btn btn-reset">リセット</button>
        </div>
        
        <div class="info">
            <div class="info-item">
                <span class="label">完了サイクル:</span>
                <span id="cycles-count">0</span>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
